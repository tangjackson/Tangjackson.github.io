<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog · Jiaxiang Tang</title>
  <link rel="shortcut icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* ── Blog hero ── */
    .blog-hero {
      padding: calc(var(--nav-height) + 52px) 0 44px;
      border-bottom: 1px solid var(--color-border);
    }
    .blog-hero h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .blog-hero p {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      max-width: 520px;
    }

    /* ── Category jump links ── */
    .cat-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 24px 0 0;
    }
    .cat-nav-link {
      font-size: 0.82rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      background: var(--color-bg);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .cat-nav-link:hover {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    /* ── Category sections ── */
    .cat-section {
      padding: 56px 0 0;
    }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .cat-icon { font-size: 1.4rem; }
    .cat-title {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--color-text);
    }
    .cat-count {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--color-text-muted);
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border);
      padding: 2px 9px;
      border-radius: 20px;
    }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 18px;
    }

    .post-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 22px 20px 18px;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      position: relative;
    }
    .post-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
      border-color: transparent;
    }
    .post-card.draft {
      opacity: 0.45;
      pointer-events: none;
    }

    .card-date {
      font-size: 0.76rem;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }
    .card-title {
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.4;
      letter-spacing: -0.01em;
    }
    .card-excerpt {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      line-height: 1.65;
      flex: 1;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }
    .card-read {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-primary);
    }
    .card-time {
      font-size: 0.76rem;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }
    .draft-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #fef9c3;
      color: #854d0e;
      border: 1px solid #fde68a;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--color-border);
      margin-top: 56px;
    }

    @media (max-width: 500px) {
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="../index.html">Jiaxiang Tang</a>
      <div class="nav-links">
        <a href="../index.html#about">About</a>
        <a href="../index.html#research">Research</a>
        <a href="../index.html#publications">Publications</a>
        <a href="../index.html#education">Education</a>
        <a href="index.html" style="color: var(--color-primary);">Blog</a>
        <a href="../cv/cv.pdf" target="_blank" class="btn-cv">CV</a>
      </div>
    </div>
  </nav>

  <div class="blog-hero">
    <div class="container">
      <h1>Learning Notes</h1>
      <p>Notes on LLM systems, inference, distributed training, and the math underneath. Written to learn by teaching.</p>
      <nav class="cat-nav" id="catNav"><!-- injected by JS --></nav>
    </div>
  </div>

  <main>
    <div class="container">
      <div id="blogContent"><!-- injected by JS --></div>
    </div>
  </main>

  <footer class="footer" style="margin-top:72px;">
    <div class="container">
      <p>© 2024 Jiaxiang Tang · <a href="../index.html">Home</a></p>
    </div>
  </footer>

  <!-- Load post data, then render -->
  <script src="posts.js"></script>
  <script>
    (function () {
      const publishedPosts = POSTS; // include drafts too (show as locked)

      /* group posts by category, keeping CATEGORIES order */
      const byCategory = {};
      for (const cat of CATEGORIES) byCategory[cat.key] = [];
      for (const post of publishedPosts) {
        if (byCategory[post.category]) byCategory[post.category].push(post);
      }

      /* build category jump links */
      const catNav = document.getElementById('catNav');
      for (const cat of CATEGORIES) {
        const posts = byCategory[cat.key];
        if (!posts.length) continue;
        const a = document.createElement('a');
        a.className = 'cat-nav-link';
        a.href = '#cat-' + cat.key;
        a.textContent = cat.icon + ' ' + cat.label;
        catNav.appendChild(a);
      }

      /* build category sections */
      const container = document.getElementById('blogContent');
      let first = true;
      for (const cat of CATEGORIES) {
        const posts = byCategory[cat.key];
        if (!posts.length) continue;

        if (!first) container.insertAdjacentHTML('beforeend', '<hr class="divider">');
        first = false;

        const publishedCount = posts.filter(p => !p.draft).length;

        container.insertAdjacentHTML('beforeend', `
          <section class="cat-section" id="cat-${cat.key}">
            <div class="cat-header">
              <span class="cat-icon">${cat.icon}</span>
              <span class="cat-title">${cat.label}</span>
              <span class="cat-count">${publishedCount} post${publishedCount !== 1 ? 's' : ''}</span>
            </div>
            <div class="card-grid" id="grid-${cat.key}"></div>
          </section>
        `);

        const grid = document.getElementById('grid-' + cat.key);

        /* sort: published first (newest), then drafts */
        const sorted = [...posts].sort((a, b) => {
          if (a.draft !== b.draft) return a.draft ? 1 : -1;
          return new Date(b.date) - new Date(a.date);
        });

        for (const post of sorted) {
          const card = document.createElement(post.draft ? 'div' : 'a');
          card.className = 'post-card' + (post.draft ? ' draft' : '');
          if (!post.draft) card.href = 'posts/' + post.slug + '.html';

          card.innerHTML = `
            ${post.draft ? '<span class="draft-badge">Coming soon</span>' : ''}
            <div class="card-date">${post.date}</div>
            <div class="card-title">${post.title}</div>
            <div class="card-excerpt">${post.excerpt}</div>
            <div class="card-footer">
              <span class="card-read">${post.draft ? '' : 'Read →'}</span>
              <span class="card-time">${post.readTime}</span>
            </div>
          `;
          grid.appendChild(card);
        }
      }
    })();
  </script>

</body>
</html>
